<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}playground-grc{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="shell">
    <nav class="sidebar">
      <div class="brand">playground-grc</div>
      <ul>
        {% for label, href in nav_items %}
        <li><a href="{{ href }}">{{ label }}</a></li>
        {% endfor %}
      </ul>
    </nav>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
