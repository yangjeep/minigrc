<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · minigrc</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-page">
    <form method="post" action="/login" class="login-form">
      <h1>minigrc</h1>
      <p class="lede">Sign in to your ISMS/GRC workspace.</p>
      {% set flash = request.query_params.get('flash') %}
      {% if flash %}
      <div class="flash flash-{{ request.query_params.get('flash_kind', 'success') }}" role="status">{{ flash }}</div>
      {% endif %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="username" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
