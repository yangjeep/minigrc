apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "minigrc.fullname" . }}-web
  labels:
    {{- include "minigrc.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "minigrc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "minigrc.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "minigrc.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Overrides the image's default CMD (which self-migrates) —
          # migrations run once via the pre-install/pre-upgrade hook Job,
          # not per-replica on every pod start.
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.web.port }}"]
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "minigrc.fullname" . }}-config
            - secretRef:
                name: {{ .Values.externalSecret.name }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "minigrc.fullname" . }}-data
      {{- end }}
