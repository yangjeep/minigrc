name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          # trust auth: this container is job-scoped and torn down at job
          # end, never reachable outside the runner — no real credential
          # to protect. See PR discussion for the GitGuardian disposition.
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: minigrc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Postgres compatibility and migration tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://postgres@localhost:5432/minigrc_test
        run: pytest tests/test_postgres_compat.py -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t minigrc:ci .

      - name: Validate compose configuration
        run: docker compose config
